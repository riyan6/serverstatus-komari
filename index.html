<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple server monitor tool." />
    <title>Komari Monitor</title>
  </head>
  <body>
    <div id="app">
      <!-- Minimal CSS spinner during bundle loading -->
      <style>
        .initial-loader {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #faf9f5;
          color: #141413;
          font-family: Inter, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
          z-index: 9999;
        }
        @media (prefers-color-scheme: dark) {
          .initial-loader {
            background-color: #141413;
            color: #faf9f5;
          }
        }
        .initial-spinner {
          width: 40px;
          height: 40px;
          border: 3px solid rgba(217, 119, 87, 0.15);
          border-top-color: #d97757;
          border-radius: 50%;
          animation: initial-spin 1s linear infinite;
        }
        @keyframes initial-spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="initial-loader">
        <div class="initial-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
